<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Preferences Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-section {
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 25px;
        }

        .form-section:last-of-type {
            border-bottom: none;
        }

        .section-title {
            color: #667eea;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 20px;
            background: #667eea;
            margin-right: 10px;
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .checkbox-group,
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .checkbox-item,
        .radio-item {
            display: flex;
            align-items: center;
        }

        input[type="checkbox"],
        input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin-right: 10px;
            accent-color: #667eea;
        }

        .checkbox-item label,
        .radio-item label {
            margin-bottom: 0;
            cursor: pointer;
            font-weight: 400;
        }

        select,
        input[type="time"],
        input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            color: #333;
            transition: border-color 0.3s;
        }

        select:focus,
        input[type="time"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        .success-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
            }

            .section-title {
                font-size: 16px;
            }

            button {
                padding: 10px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Study Preferences</h1>
        <p class="subtitle">Customize your ideal study environment</p>

        <div class="success-message" id="successMessage">✓ Preferences saved successfully!</div>

        <form id="studyPreferencesForm">
            <!-- Study Environment Section -->
            <div class="form-section">
                <div class="section-title">Study Environment</div>

                <div class="form-group">
                    <label>Preferred Study Environment</label>
                    <div class="radio-group">
                        <div class="radio-item">
                            <input type="radio" id="env-quiet" name="environment" value="quiet">
                            <label for="env-quiet">Quiet</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="env-music" name="environment" value="music">
                            <label for="env-music">With Background Music</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="env-ambient" name="environment" value="ambient">
                            <label for="env-ambient">Ambient Sounds (coffee shop, nature)</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Lighting Preference</label>
                    <div class="radio-group">
                        <div class="radio-item">
                            <input type="radio" id="light-natural" name="lighting" value="natural">
                            <label for="light-natural">Natural Light</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="light-bright" name="lighting" value="bright">
                            <label for="light-bright">Bright Artificial Light</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="light-dim" name="lighting" value="dim">
                            <label for="light-dim">Dim Lighting</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="location">Study Location</label>
                    <select id="location" name="location">
                        <option value="">Select a location</option>
                        <option value="home">Home</option>
                        <option value="library">Library</option>
                        <option value="cafe">Coffee Shop</option>
                        <option value="outdoors">Outdoors</option>
                        <option value="coworking">Coworking Space</option>
                    </select>
                </div>
            </div>

            <!-- Study Schedule Section -->
            <div class="form-section">
                <div class="section-title">Study Schedule</div>

                <div class="form-group">
                    <label for="startTime">Preferred Study Start Time</label>
                    <input type="time" id="startTime" name="startTime">
                </div>

                <div class="form-group">
                    <label for="sessionDuration">Preferred Session Duration (minutes)</label>
                    <input type="number" id="sessionDuration" name="sessionDuration" min="15" max="180" placeholder="45">
                </div>

                <div class="form-group">
                    <label for="breakDuration">Preferred Break Duration (minutes)</label>
                    <input type="number" id="breakDuration" name="breakDuration" min="5" max="60" placeholder="15">
                </div>
            </div>

            <!-- Learning Style Section -->
            <div class="form-section">
                <div class="section-title">Learning Style</div>

                <div class="form-group">
                    <label>Preferred Learning Methods (select all that apply)</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="style-visual" name="learningStyle" value="visual">
                            <label for="style-visual">Visual (videos, diagrams, mind maps)</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="style-auditory" name="learningStyle" value="auditory">
                            <label for="style-auditory">Auditory (lectures, discussions)</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="style-reading" name="learningStyle" value="reading">
                            <label for="style-reading">Reading/Writing (notes, textbooks)</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="style-kinesthetic" name="learningStyle" value="kinesthetic">
                            <label for="style-kinesthetic">Kinesthetic (hands-on, practice)</label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Subject Preferences Section -->
            <div class="form-section">
                <div class="section-title">Subject Preferences</div>

                <div class="form-group">
                    <label>Primary Subjects You Study (select all that apply)</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="subj-math" name="subjects" value="math">
                            <label for="subj-math">Mathematics</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="subj-science" name="subjects" value="science">
                            <label for="subj-science">Science</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="subj-language" name="subjects" value="language">
                            <label for="subj-language">Language/Literature</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="subj-history" name="subjects" value="history">
                            <label for="subj-history">History/Social Studies</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="subj-coding" name="subjects" value="coding">
                            <label for="subj-coding">Programming/Coding</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="subj-other" name="subjects" value="other">
                            <label for="subj-other">Other</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="difficulty">Preferred Difficulty Level</label>
                    <select id="difficulty" name="difficulty">
                        <option value="">Select difficulty level</option>
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="advanced">Advanced</option>
                        <option value="mixed">Mixed (I like variety)</option>
                    </select>
                </div>
            </div>

            <!-- Additional Preferences Section -->
            <div class="form-section">
                <div class="section-title">Additional Preferences</div>

                <div class="form-group">
                    <label>Study Goals (select all that apply)</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="goal-improve-grades" name="goals" value="improve-grades">
                            <label for="goal-improve-grades">Improve Grades</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="goal-test-prep" name="goals" value="test-prep">
                            <label for="goal-test-prep">Test Preparation</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="goal-skill-learn" name="goals" value="skill-learn">
                            <label for="goal-skill-learn">Learn New Skills</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="goal-homework" name="goals" value="homework">
                            <label for="goal-homework">Complete Homework</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Distractions to Avoid (select all that apply)</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="distract-phone" name="distractions" value="phone">
                            <label for="distract-phone">Phone/Social Media</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="distract-notifications" name="distractions" value="notifications">
                            <label for="distract-notifications">Notifications</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="distract-interruptions" name="distractions" value="interruptions">
                            <label for="distract-interruptions">People/Interruptions</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="distract-noise" name="distractions" value="noise">
                            <label for="distract-noise">Noise</label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <button type="submit" class="btn-submit">Save Preferences</button>
                <button type="reset" class="btn-reset">Clear All</button>
            </div>
        </form>
    </div>

    <script>
        // Load preferences from localStorage on page load
        function loadPreferences() {
            const saved = localStorage.getItem('studyPreferences');
            if (saved) {
                const preferences = JSON.parse(saved);
                Object.keys(preferences).forEach(key => {
                    const element = document.getElementById(key) || document.querySelector(`[name="${key}"]`);
                    if (element) {
                        if (element.type === 'checkbox') {
                            const checkboxes = document.querySelectorAll(`[name="${key}"]`);
                            checkboxes.forEach(cb => {
                                cb.checked = preferences[key].includes(cb.value);
                            });
                        } else if (element.type === 'radio') {
                            const radio = document.querySelector(`[name="${key}"][value="${preferences[key]}"]`);
                            if (radio) radio.checked = true;
                        } else {
                            element.value = preferences[key];
                        }
                    }
                });
            }
        }

        // Save form data to localStorage
        function savePreferences() {
            const form = document.getElementById('studyPreferencesForm');
            const formData = new FormData(form);
            const preferences = {};

            // Get all form fields
            form.querySelectorAll('input[type="radio"], input[type="time"], input[type="number"], select').forEach(field => {
                if (field.type === 'radio' && field.checked) {
                    preferences[field.name] = field.value;
                } else if (field.type === 'time' || field.type === 'number') {
                    if (field.value) {
                        preferences[field.id] = field.value;
                    }
                } else if (field.tagName === 'SELECT') {
                    if (field.value) {
                        preferences[field.id] = field.value;
                    }
                }
            });

            // Get all checkboxes
            const checkboxGroups = ['learningStyle', 'subjects', 'goals', 'distractions'];
            checkboxGroups.forEach(group => {
                const checked = Array.from(document.querySelectorAll(`[name="${group}"]:checked`))
                    .map(cb => cb.value);
                if (checked.length > 0) {
                    preferences[group] = checked;
                }
            });

            localStorage.setItem('studyPreferences', JSON.stringify(preferences));
        }

        // Handle form submission
        document.getElementById('studyPreferencesForm').addEventListener('submit', function(e) {
            e.preventDefault();
            savePreferences();
            
            // Show success message
            const successMsg = document.getElementById('successMessage');
            successMsg.classList.add('show');
            setTimeout(() => {
                successMsg.classList.remove('show');
            }, 3000);
        });

        // Load preferences when page loads
        document.addEventListener('DOMContentLoaded', loadPreferences);
    </script>
</body>
</html>
