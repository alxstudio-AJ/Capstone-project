<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Preferences Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 32px;
            max-width: 560px;
            width: 100%;
        }

        h1 {
            color: #1f2937;
            margin-bottom: 8px;
            text-align: center;
            font-size: 28px;
        }

        .subtitle {
            color: #6b7280;
            text-align: center;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .success-message {
            display: none;
            background: #d1fae5;
            color: #065f46;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #a7f3d0;
        }

        .success-message.show {
            display: block;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            color: #374151;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        select:focus {
            outline: none;
            border-color: #4f46e5;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
        }

        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            accent-color: #4f46e5;
        }

        .error-message {
            color: #dc2626;
            font-size: 12px;
            margin-top: 6px;
            min-height: 16px;
        }

        .error-input {
            border-color: #dc2626;
        }

        button {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s ease;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
        }

        button:hover {
            transform: translateY(-1px);
        }

        @media (max-width: 600px) {
            body {
                padding: 12px;
            }

            .container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Study Preferences</h1>
        <p class="subtitle">Tell us how you like to study.</p>

        <div class="success-message" id="successMessage">Preferences saved successfully!</div>

        <form id="studyPreferencesForm" novalidate>
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" required>
                <div class="error-message" id="fullNameError"></div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="duration">Study Duration</label>
                <select id="duration" name="duration" required>
                    <option value="">Select duration</option>
                    <option value="15">15 minutes</option>
                    <option value="30">30 minutes</option>
                    <option value="45">45 minutes</option>
                    <option value="60">60 minutes</option>
                </select>
                <div class="error-message" id="durationError"></div>
            </div>

            <div class="form-group">
                <label>Subjects</label>
                <div class="checkbox-group" id="subjectsGroup">
                    <div class="checkbox-item">
                        <input type="checkbox" id="subject-math" name="subjects" value="Math">
                        <label for="subject-math">Math</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="subject-physics" name="subjects" value="Physics">
                        <label for="subject-physics">Physics</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="subject-chemistry" name="subjects" value="Chemistry">
                        <label for="subject-chemistry">Chemistry</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="subject-biology" name="subjects" value="Biology">
                        <label for="subject-biology">Biology</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="subject-english" name="subjects" value="English">
                        <label for="subject-english">English</label>
                    </div>
                </div>
                <div class="error-message" id="subjectsError"></div>
            </div>

            <button type="submit">Submit</button>
        </form>
    </div>

    <script type="module">
        import { validateStudyPreferences } from './study-form.js';

        const form = document.getElementById('studyPreferencesForm');
        const successMessage = document.getElementById('successMessage');
        const fields = {
            fullName: document.getElementById('fullName'),
            email: document.getElementById('email'),
            duration: document.getElementById('duration')
        };

        function setError(fieldName, message) {
            const input = fields[fieldName] || document.querySelector(`[name="${fieldName}"]`);
            const errorElement = document.getElementById(`${fieldName}Error`);
            if (input) {
                input.classList.toggle('error-input', Boolean(message));
            }
            if (errorElement) {
                errorElement.textContent = message || '';
            }
        }

        function clearErrors() {
            Object.keys(fields).forEach((fieldName) => setError(fieldName, ''));
            document.getElementById('subjectsError').textContent = '';
            document.querySelectorAll('input[name="subjects"]').forEach((checkbox) => {
                checkbox.classList.remove('error-input');
            });
        }

        function collectFormValues() {
            return {
                fullName: form.fullName.value,
                email: form.email.value,
                duration: form.duration.value,
                subjects: Array.from(form.querySelectorAll('input[name="subjects"]:checked')).map((checkbox) => checkbox.value)
            };
        }

        function renderErrors(errors) {
            clearErrors();
            Object.entries(errors).forEach(([fieldName, message]) => {
                if (fieldName === 'subjects') {
                    document.getElementById('subjectsError').textContent = message;
                    document.querySelectorAll('input[name="subjects"]').forEach((checkbox) => {
                        checkbox.classList.add('error-input');
                    });
                } else {
                    setError(fieldName, message);
                }
            });
        }

        form.addEventListener('submit', function (event) {
            event.preventDefault();
            clearErrors();
            successMessage.classList.remove('show');

            const values = collectFormValues();
            const errors = validateStudyPreferences(values);

            if (Object.keys(errors).length > 0) {
                renderErrors(errors);
                return;
            }

            successMessage.textContent = 'Preferences saved successfully!';
            successMessage.classList.add('show');
        });

        form.addEventListener('input', function (event) {
            if (event.target.name === 'subjects') {
                const values = collectFormValues();
                const errors = validateStudyPreferences(values);
                if (errors.subjects) {
                    document.getElementById('subjectsError').textContent = errors.subjects;
                } else {
                    document.getElementById('subjectsError').textContent = '';
                }
            }
        });
    </script>
</body>
</html>
